<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-800 p-6">
    <div class="p-8">
        <div class="text-center">
            <h1 class="text-3xl font-extrabold text-gray-900">Welcome Dashboard</h1>
            <p class="text-sm text-gray-500 mt-2">Welcome to your dashboard.</p>
        </div>

        <form id="userForm" class="space-y-4">
            <div>
                <label for="userName" class="block text-sm font-semibold text-gray-700 mb-1">Your Name</label>
                <input type="text" id="userName" class="w-full px-4 py-2 border rounded-lg"
                    placeholder="Japheth Kiprono" />
            </div>

            <div>
                <label for="userAge" class="block text-sm font-semibold text-gray-700 mb-1">Your Age</label>
                <input type="number" id="userAge" class="w-full px-4 py-2 border border-gray-300 rounded-lg"
                    placeholder="25" />
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white font-medium py-2.5 px-4 rounded-lg">
                Generate Dashboard
            </button>
        </form>
        <div class="bg-gray-50 text-gray-800 rounded-xl p-6 text-center border  mt-6">
            <h3 class="text-xs font-bold text-amber-700 uppercase tracking-wider mb-2">
                Daily Motivation
            </h3>
            <p id="quoteDisplay"
                class="text-gray-700 italic font-medium min-h-[48px] flex items-center justify-center px-4 transition-opacity duration-500">
                Loading inspiration...
            </p>
        </div>
    </div>

    <script src="script.js" type="text/javascript"></script>
</body>

</html>
